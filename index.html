<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORAKUL V5.5 // NETWORK</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-cyan: #00f3ff; --neon-magenta: #ff00ff; --neon-green: #39ff14;
            --neon-red: #ff3131; --neon-yellow: #fff200; --bg-dark: #050505;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-dark); color: var(--neon-cyan);
            font-family: 'Courier New', monospace; margin: 0; padding: 10px;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            text-transform: uppercase; font-size: 13px;
        }
        header {
            display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: 5px; margin-bottom: 10px; font-size: 9px;
        }
        .node {
            background: rgba(0, 243, 255, 0.05); border: 1px solid var(--neon-cyan);
            padding: 10px; margin-bottom: 10px; position: relative;
        }
        .node-label { font-size: 8px; color: var(--neon-magenta); margin-bottom: 5px; }
        .big-val { font-size: 1.8rem; font-weight: bold; transition: 0.3s; }
        
        .status-fiat { color: var(--neon-yellow) !important; }
        .status-long { color: var(--neon-green) !important; }
        .status-short { color: var(--neon-red) !important; }

        .net-info { font-size: 8px; color: #555; display: flex; gap: 10px; }
        .online-dot { color: var(--neon-green); }

        .master-switch {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px; border: 1px dashed var(--neon-magenta); margin-top: 5px;
        }

        #stop-btn {
            width: 100%; padding: 10px; margin-top: 10px; background: none;
            border: 1px solid var(--neon-red); color: var(--neon-red);
            font-family: inherit; font-weight: bold;
        }
        #stop-btn.active { background: var(--neon-red); color: black; }

        #terminal {
            flex-grow: 1; background: black; border: 1px solid var(--neon-magenta);
            padding: 8px; overflow-y: auto; font-size: 9px; margin-top: 10px;
        }
        .log { margin-bottom: 2px; border-left: 2px solid var(--neon-cyan); padding-left: 5px; }
    </style>
</head>
<body>

<header>
    <div id="net-stat">NETWORK_SYNC: <span class="online-dot">●</span> <span id="online-count">1</span> NODES</div>
    <div id="sys-clock">00:00:00</div>
</header>

<div class="node">
    <div class="node-label">MARKET_PULSE</div>
    <div id="price" class="big-val" style="color:var(--neon-cyan)">00000.00</div>
</div>

<div class="node">
    <div class="node-label">ACCOUNT_SESSION</div>
    <div id="balance" class="big-val status-fiat">$10,000.00</div>
    <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:10px;">
        <span>POS: <span id="pos-type">FLAT</span></span>
        <span id="pnl-val">0.00%</span>
    </div>
</div>

<div class="node">
    <div class="node-label">CONTROL_UNIT</div>
    <div style="font-size: 9px; margin-bottom: 5px;">VELOCITY: <span id="spd-lbl">SWING</span></div>
    <input type="range" id="spd-sld" min="1" max="5" value="3" style="width:100%">
    
    <div class="master-switch">
        <span>MASTER_BRAIN</span>
        <input type="checkbox" id="master-toggle" checked>
    </div>
    
    <button id="stop-btn">STOP_AI</button>
</div>

<div id="terminal"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDA5ol08AMQc3MmZMUYOLD9_P0RQLK9Fn4",
        authDomain: "bitorakul.firebaseapp.com",
        databaseURL: "https://bitorakul-default-rtdb.firebaseio.com",
        projectId: "bitorakul",
        storageBucket: "bitorakul.firebasestorage.app",
        messagingSenderId: "664775878094",
        appId: "1:664775878094:web:6b5314cc9723332ccaf79f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { balance: 10000, position: null, prices: [], speed: 3, running: true, isMaster: true };
    const Profiles = {
        1: { n: "SCALP", i: 2000, ef: 3, es: 7, r: 7 },
        2: { n: "INTRADAY", i: 10000, ef: 8, es: 21, r: 14 },
        3: { n: "SWING", i: 60000, ef: 12, es: 26, r: 14 },
        4: { n: "TREND", i: 300000, ef: 20, es: 50, r: 21 },
        5: { n: "HODL", i: 3600000, ef: 50, es: 200, r: 21 }
    };

    const MathCore = {
        ema: (d, n) => { let k = 2/(n+1); let e = d[0]; for(let i=1;i<d.length;i++) e = d[i]*k+e*(1-k); return e; },
        rsi: (d, n) => {
            if(d.length <= n) return 50;
            let g=0, l=0; for(let i=d.length-n; i<d.length; i++) { let diff = d[i]-d[i-1]; if(diff>=0) g+=diff; else l-=diff; }
            return 100-(100/(1+(g/n)/((l/n)||1)));
        }
    };

    function log(msg, type='') {
        const t = document.getElementById('terminal');
        const d = document.createElement('div'); d.className = `log ${type}`;
        d.innerHTML = `> ${msg}`; t.prepend(d);
        if(t.children.length > 25) t.lastChild.remove();
    }

    // --- SYNC CORE ---
    function trade(side, price) {
        if (!state.isMaster) return; // Только мастер может инициировать сделку
        if (side === 'LONG' || side === 'SHORT') {
            state.position = { price, amount: (state.balance || 10000) / price, type: side };
            state.balance = 0;
        } else if (side === 'CLOSE') {
            const p = state.position;
            if(!p) return;
            state.balance = (p.type === 'LONG') ? p.amount * price : (p.amount * p.price) + (p.price - price) * p.amount;
            state.position = null;
        }
        db.ref('orakel_v5_network').set({ bal: state.balance, pos: state.position, run: state.running, spd: state.speed });
    }

    // Слушаем облако в реальном времени
    db.ref('orakel_v5_network').on('value', (s) => {
        const d = s.val();
        if (!d) return;
        state.balance = d.bal; state.position = d.pos; state.running = d.run;
        
        if (state.speed != d.spd) {
            state.speed = d.spd;
            document.getElementById('spd-sld').value = d.spd;
            document.getElementById('spd-lbl').innerText = Profiles[d.spd].n;
            if(state.isMaster) {
                clearInterval(window.bT); window.bT = setInterval(brain, Profiles[d.spd].i);
            }
        }

        const stopBtn = document.getElementById('stop-btn');
        stopBtn.className = state.running ? '' : 'active';
        stopBtn.innerText = state.running ? 'STOP_AI' : 'START_AI';
        
        const balEl = document.getElementById('balance');
        balEl.className = 'big-val';
        if (!state.position) balEl.classList.add('status-fiat');
        else balEl.classList.add(state.position.type === 'LONG' ? 'status-long' : 'status-short');
        document.getElementById('pos-type').innerText = state.position ? state.position.type : 'FLAT';
    });

    // Счетчик присутствия
    const presenceRef = db.ref('presence').push();
    presenceRef.onDisconnect().remove();
    presenceRef.set(true);
    db.ref('presence').on('value', s => {
        document.getElementById('online-count').innerText = s.numChildren();
    });

    function brain() {
        if (!state.running || !state.isMaster) return;
        const p = parseFloat(document.getElementById('price').innerText);
        if (!p) return;
        state.prices.push(p); if(state.prices.length > 300) state.prices.shift();
        const conf = Profiles[state.speed];
        if(state.prices.length < conf.es) return;

        const ef = MathCore.ema(state.prices, conf.ef);
        const es = MathCore.ema(state.prices, conf.es);
        const threshold = p * 0.0001;

        if (!state.position) {
            if (ef > es + threshold) trade('LONG', p);
            else if (ef < es - threshold) trade('SHORT', p);
        } else {
            if (state.position.type === 'LONG' && ef < es - threshold) { trade('CLOSE', p); trade('SHORT', p); }
            else if (state.position.type === 'SHORT' && ef > es + threshold) { trade('CLOSE', p); trade('LONG', p); }
        }
    }

    // UI Events
    document.getElementById('stop-btn').onclick = () => {
        const p = parseFloat(document.getElementById('price').innerText);
        const nextRunning = !state.running;
        if (!nextRunning && state.position) {
             // Мастер или не мастер, при нажатии стоп - закрываем в облаке
             state.isMaster = true; // Временно берем управление чтобы закрыть
             trade('CLOSE', p);
        }
        db.ref('orakel_v5_network').update({ run: nextRunning });
    };

    document.getElementById('master-toggle').onchange = function() {
        state.isMaster = this.checked;
        log(state.isMaster ? "NODE: MASTER_ACTIVE" : "NODE: OBSERVER_ONLY", "sys");
        if(state.isMaster) {
            const conf = Profiles[state.speed];
            window.bT = setInterval(brain, conf.interval);
        } else {
            clearInterval(window.bT);
        }
    };

    document.getElementById('spd-sld').oninput = function() {
        db.ref('orakel_v5_network').update({ spd: this.value });
    };

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    ws.onmessage = (e) => {
        const p = parseFloat(JSON.parse(e.data).c);
        document.getElementById('price').innerText = p.toFixed(2);
        if (state.position) {
            const pos = state.position;
            const pnl = (pos.type === 'LONG') ? ((p/pos.price-1)*100) : ((pos.price/p-1)*100);
            document.getElementById('pnl-val').innerText = pnl.toFixed(2) + "%";
            document.getElementById('pnl-val').style.color = pnl >= 0 ? 'var(--neon-green)' : 'var(--neon-red)';
            const curBal = (pos.type === 'LONG') ? pos.amount * p : (pos.amount * pos.price) + (pos.price - p) * pos.amount;
            document.getElementById('balance').innerText = `$${curBal.toFixed(2)}`;
        } else {
            document.getElementById('balance').innerText = `$${state.balance.toFixed(2)}`;
            document.getElementById('pnl-val').innerText = "0.00%";
        }
    };

    window.onload = () => {
        setInterval(() => document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString(), 1000);
    };
</script>
</body>
</html>
