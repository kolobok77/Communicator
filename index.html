<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Communikator Pro - Control Center</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surf: #12121a; --border: rgba(255,255,255,0.07);
  --accent: #7efff5; --red: #ff6b6b; --green: #7effa0;
  --text: #e8e8f0; --muted: rgba(232,232,240,0.4);
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text);
  font-family: 'DM Mono', monospace; overflow:hidden; touch-action: manipulation; }

.app-container { display: flex; width: 100%; height: 100%; }

/* БОКОВАЯ ПАНЕЛЬ */
.sidebar {
    width: 60px; background: var(--surf); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px;
}
.side-btn {
    width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: 0.3s;
}
.side-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(126,255,245,0.05); box-shadow: 0 0 15px rgba(126,255,245,0.1); }
.side-btn.danger { color: var(--red); border-color: rgba(255,107,107,0.2); }

/* ОСНОВНОЙ КОНТЕНТ */
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
.card { width: 100%; max-width: 400px; padding: 0 20px; text-align: center; }

.logo-top { font-size: 9px; letter-spacing: 0.4em; color: var(--muted); margin-bottom: 30px; }

.room-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 20px; background: rgba(126,255,245,0.05); border: 1px solid var(--border); font-size: 10px; color: var(--accent); margin-bottom: 20px; }
.bdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

.user-list { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.user-item { 
    background: var(--surf); border: 1px solid var(--border); padding: 12px; 
    border-radius: 12px; display: flex; justify-content: space-between; font-size: 11px;
}
.user-item.me { border-color: var(--accent); }

/* ПЛАШКА АКТИВАЦИИ */
#audio-alert {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: #000; padding: 10px 20px; border-radius: 10px;
    font-weight: 700; font-size: 11px; cursor: pointer; animation: slideDown 0.4s ease;
}
@keyframes slideDown { from {top: -50px;} to {top: 20px;} }

@keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }
.status-sync { animation: pulse 1.5s infinite; color: var(--muted); font-size: 10px; }

</style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="logo-top" style="writing-mode: vertical-lr; transform: rotate(180); margin-bottom: auto;">VOICE</div>
        
        <button id="btn-speaker" class="side-btn" onclick="activateAudio('speaker')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </button>

        <button id="btn-bt" class="side-btn" onclick="activateAudio('bt')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 7 10 10-5 5V2l5 5L7 17"></path></svg>
        </button>

        <button class="side-btn danger" onclick="exitApp()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.03 19.42 19.42 0 0 1-3.33-2.67 19.42 19.42 0 0 1-2.67-3.33 19.79 19.79 0 0 1-3.03-8.63A2 2 0 0 1 3.54 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="22" y1="2" x2="2" y2="22"></line></svg>
        </button>
    </div>

    <div class="main">
        <div id="audio-alert" onclick="activateAudio('speaker')">🔊 TAP TO ACTIVATE SOUND</div>

        <div class="card" id="root">
            <div class="status-sync">INITIALIZING...</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNku1yfBpM-SR-24S9cTLlfYDr_0uqKSA",
  databaseURL: "https://communikator-37260-default-rtdb.firebaseio.com",
  projectId: "communikator-37260",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let STATE = 'idle'; 
let roomName = '';
let myPeerId = '';
let peerInst = null;
let rawStream = null;
let activeCalls = {};
let participants = [];
let audioActivated = false;

const loadPeerJS = () => new Promise(res => {
    if (window.Peer) return res();
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    s.onload = res;
    document.head.appendChild(s);
});

// ФУНКЦИЯ АКТИВАЦИИ ЗВУКА ИЗ МЕНЮ
async function activateAudio(mode) {
    audioActivated = true;
    document.getElementById('audio-alert').style.display = 'none';
    
    // Подсвечиваем кнопку
    document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + mode).classList.add('active');

    // "Будим" аудио-контекст
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    await ctx.resume();

    // Пытаемся запустить все пришедшие потоки
    document.querySelectorAll('audio').forEach(a => a.play().catch(e => {}));

    if (STATE === 'idle') {
        const hash = window.location.hash.substring(1);
        if (hash) joinRoom(hash);
        else promptRoom();
    }
}

async function cleanup() {
    document.querySelectorAll('audio').forEach(a => a.remove());
    if (roomName && myPeerId) await db.ref(`rooms/${roomName}/${myPeerId}`).remove();
    Object.values(activeCalls).forEach(c => c.close());
    activeCalls = {};
    if (rawStream) { rawStream.getTracks().forEach(t => t.stop()); rawStream = null; }
    if (peerInst) { peerInst.destroy(); peerInst = null; }
}

function exitApp() {
    window.location.hash = '';
    cleanup().then(() => { location.reload(); });
}

async function joinRoom(name) {
    roomName = name;
    setS('joining');
    await loadPeerJS();
    
    myPeerId = 'u_' + Math.random().toString(36).substring(2, 6);
    peerInst = new Peer(myPeerId);

    peerInst.on('open', async (id) => {
        rawStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        db.ref(`rooms/${roomName}/${id}`).set({ status: 'online' });
        db.ref(`rooms/${roomName}/${id}`).onDisconnect().remove();

        db.ref(`rooms/${roomName}`).on('value', (snap) => {
            participants = Object.keys(snap.val() || {});
            render();
        });

        db.ref(`rooms/${roomName}`).once('value', (snap) => {
            snap.forEach(child => {
                if (child.key !== myPeerId) handleStream(peerInst.call(child.key, rawStream));
            });
        });
        setS('connected');
    });

    peerInst.on('call', async (call) => {
        if (!rawStream) rawStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        call.answer(rawStream);
        handleStream(call);
    });
}

function handleStream(call) {
    activeCalls[call.peer] = call;
    call.on('stream', (stream) => {
        let audio = document.getElementById('audio-' + call.peer) || document.createElement('audio');
        audio.id = 'audio-' + call.peer;
        audio.setAttribute('autoplay', 'true');
        audio.setAttribute('playsinline', 'true');
        audio.srcObject = stream;
        document.body.appendChild(audio);
        if (audioActivated) audio.play().catch(e => {});
        render();
    });
    call.on('close', () => { 
        const a = document.getElementById('audio-' + call.peer);
        if(a) a.remove();
        delete activeCalls[call.peer]; 
        render(); 
    });
}

function setS(s) { STATE = s; render(); }

function render() {
    const root = document.getElementById('root');
    if (STATE === 'idle' || STATE === 'joining') {
        root.innerHTML = `<div class="orb" onclick="activateAudio('speaker')"><div class="ring"></div><div class="orb-face"><svg class="orb-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg><span class="orb-tag">START</span></div></div>`;
        return;
    }

    const users = participants.map(pid => {
        const isMe = pid === myPeerId;
        const connected = isMe || activeCalls[pid];
        return `
            <div class="user-item ${isMe ? 'me' : ''}">
                <span>${pid} ${isMe ? '(YOU)' : ''}</span>
                <span style="color: ${connected ? 'var(--green)' : 'var(--muted)'}">${connected ? '● LIVE' : 'WAITING'}</span>
            </div>
        `;
    }).join('');

    root.innerHTML = `
        <div class="room-badge"><div class="bdot"></div>ROOM: ${roomName}</div>
        <div class="user-list">${users}</div>
    `;
}

function promptRoom() {
    const n = prompt("Room name:", "general");
    if (n) { window.location.hash = n; joinRoom(n); }
}

window.onload = () => {
    const h = window.location.hash.substring(1);
    if (!h) render();
    else document.getElementById('audio-alert').style.display = 'block';
};
</script>
</body>
</html>
