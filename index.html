<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Communikator - Voice Room</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surf: #12121a; --border: rgba(255,255,255,0.07);
  --accent: #7efff5; --red: #ff6b6b; --green: #7effa0;
  --text: #e8e8f0; --muted: rgba(232,232,240,0.4);
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text);
  font-family: 'DM Mono', monospace; overflow:hidden; touch-action: manipulation; }

.app { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.card { width:100%; max-width:440px; padding:0 20px; display:flex; flex-direction:column; align-items:center; }

.logo { font-size:10px; font-weight:700; letter-spacing:0.36em; text-transform:uppercase;
  color:var(--muted); margin-bottom:40px; display:flex; align-items:center; gap:12px; }
.logo::before, .logo::after { content:''; width:24px; height:1px; background:var(--border); }

/* ORB UI */
.orb { position:relative; width:160px; height:160px; margin-bottom:40px;
  cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; }
.ring { position:absolute; inset:0; border-radius:50%; border:1px solid rgba(126,255,245,0.14);
  transition: transform 0.5s; animation: pulse 2s infinite; }
.ring:nth-child(2) { inset: -10px; opacity: 0.3; animation-delay: 0.5s; }

@keyframes pulse { 0% {transform: scale(1); opacity: 0.4;} 50% {transform: scale(1.08); opacity: 0.7;} 100% {transform: scale(1); opacity: 0.4;} }

.orb-face { position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle at 34% 32%, #1a2828, #0c0c13);
  border:1px solid rgba(126,255,245,0.18);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; transition: 0.3s; }
.orb:hover .orb-face { border-color: var(--accent); box-shadow: 0 0 30px rgba(126,255,245,0.1); }

.orb-ico { width:30px; height:30px; color:var(--accent); filter:drop-shadow(0 0 10px rgba(126,255,245,0.4)); }
.orb-tag { font-size:9px; font-weight:700; letter-spacing:0.24em; text-transform:uppercase; color:var(--muted); }

/* CALL UI */
.call-sec { width:100%; display:flex; flex-direction:column; align-items:center; gap:20px; animation: fadeIn 0.5s ease; }
.room-badge { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--green); letter-spacing:0.1em; font-weight:700; }
.bdot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); }

.user-list { width:100%; max-height:180px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; margin: 10px 0; scrollbar-width: none; }
.user-item { 
    background: var(--surf); border: 1px solid var(--border); padding: 12px 16px; 
    border-radius: 12px; font-size: 10px; display: flex; justify-content: space-between; align-items: center;
}
.user-id { color: var(--muted); }
.user-status { font-weight: 700; font-size: 8px; text-transform: uppercase; }
.user-item.me { border-color: var(--accent); background: rgba(126,255,245,0.03); }
.user-item.me .user-id { color: var(--accent); }

.hang { width:64px; height:64px; border-radius:50%; background: #190909; border:1px solid rgba(255,107,107,0.2);
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition: 0.2s; margin-top: 10px; }
.hang:hover { border-color: var(--red); transform: scale(1.1); }

@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
</style>
</head>
<body>
    <div class="app"><div id="root"></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNku1yfBpM-SR-24S9cTLlfYDr_0uqKSA",
  databaseURL: "https://communikator-37260-default-rtdb.firebaseio.com",
  projectId: "communikator-37260",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let STATE = 'idle'; 
let roomName = '';
let myPeerId = '';
let peerInst = null;
let rawStream = null;
let activeCalls = {};
let participants = [];

const loadPeerJS = () => new Promise(res => {
    if (window.Peer) return res();
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    s.onload = res;
    document.head.appendChild(s);
});

async function cleanup() {
    if (roomName && myPeerId) await db.ref(`rooms/${roomName}/${myPeerId}`).remove();
    Object.values(activeCalls).forEach(call => call.close());
    activeCalls = {};
    if (rawStream) { rawStream.getTracks().forEach(t => t.stop()); rawStream = null; }
    if (peerInst) { peerInst.destroy(); peerInst = null; }
    document.querySelectorAll('audio').forEach(a => a.remove());
}

function exitApp() {
    window.location.hash = '';
    cleanup().then(() => { location.reload(); });
}

// ОСНОВНОЙ ВХОД (с активацией звука)
async function startSession() {
    // Активируем аудио-контекст через жест пользователя
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    await audioCtx.resume();

    const hash = window.location.hash.substring(1);
    if (hash) joinRoom(hash);
    else {
        const name = prompt("Enter room name:", "general");
        if (name) { window.location.hash = name; joinRoom(name); }
    }
}

async function joinRoom(name) {
    roomName = name;
    setS('joining');
    await loadPeerJS();
    
    // Генерируем уникальный ID для каждой сессии
    myPeerId = 'u' + Math.random().toString(36).substring(2, 6) + Date.now().toString().slice(-3);
    peerInst = new Peer(myPeerId);

    peerInst.on('open', async (id) => {
        rawStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
        });
        
        const myRef = db.ref(`rooms/${roomName}/${id}`);
        myRef.set({ status: 'online' });
        myRef.onDisconnect().remove();

        // Слушаем участников
        db.ref(`rooms/${roomName}`).on('value', (snapshot) => {
            participants = Object.keys(snapshot.val() || {});
            render();
        });

        // Звоним тем, кто уже в комнате
        db.ref(`rooms/${roomName}`).once('value', (snapshot) => {
            snapshot.forEach((child) => {
                if (child.key !== myPeerId) {
                    handleCall(peerInst.call(child.key, rawStream));
                }
            });
        });
        setS('connected');
    });

    peerInst.on('call', async (call) => {
        if (!rawStream) rawStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        call.answer(rawStream);
        handleCall(call);
    });
}

function handleCall(call) {
    activeCalls[call.peer] = call;
    call.on('stream', (stream) => {
        let audio = document.getElementById('audio-' + call.peer) || document.createElement('audio');
        audio.id = 'audio-' + call.peer;
        audio.autoplay = true;
        audio.setAttribute('playsinline', 'true');
        audio.srcObject = stream;
        document.body.appendChild(audio);
        render();
    });
    call.on('close', () => {
        const a = document.getElementById('audio-' + call.peer);
        if (a) a.remove();
        delete activeCalls[call.peer];
        render();
    });
}

function setS(s) { STATE = s; render(); }

function render() {
    const root = document.getElementById('root');
    let html = '';

    if (STATE === 'idle' || STATE === 'joining') {
        const label = STATE === 'idle' ? 'START' : 'SYNCING...';
        html = `
            <div class="orb" onclick="startSession()">
                <div class="ring"></div><div class="ring"></div>
                <div class="orb-face">
                    <svg class="orb-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                    <span class="orb-tag">${label}</span>
                </div>
            </div>`;
    } else if (STATE === 'connected') {
        const userList = participants.map(pid => {
            const isMe = pid === myPeerId;
            const isLive = isMe || activeCalls[pid];
            return `
                <div class="user-item ${isMe ? 'me' : ''}">
                    <span class="user-id">${pid} ${isMe ? '(YOU)' : ''}</span>
                    <span class="user-status" style="color: ${isLive ? 'var(--green)' : 'var(--muted)'}">
                        ${isLive ? '● LIVE' : 'WAITING'}
                    </span>
                </div>`;
        }).join('');

        html = `
            <div class="call-sec">
                <div class="room-badge"><div class="bdot"></div>ROOM: ${roomName}</div>
                <div class="user-list">${userList}</div>
                <button class="hang" onclick="exitApp()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--red)"><path d="M23.71 16.67C20.66 13.78 16.54 12 12 12c-4.54 0-8.66 1.78-11.71 4.67-.18.18-.29.43-.29.71 0 .28.11.53.29.71l2.48 2.48c.18.18.43.29.71.29.27 0 .52-.11.7-.28.79-.74 1.69-1.36 2.66-1.85.33-.16.56-.5.56-.9v-3.1c1.45-.47 3-.73 4.6-.73 1.6 0 3.15.26 4.6.72v3.1c0 .4.23.74.56.9.98.49 1.87 1.12 2.66 1.85.18.18.43.28.7.28.28 0 .53-.11.71-.29l2.48-2.48c.18-.18.29-.43.29-.71 0-.28-.11-.53-.29-.71z"/></svg>
                </button>
            </div>`;
    }

    root.innerHTML = `<div class="card"><div class="logo">COMMUNIKATOR</div>${html}</div>`;
}

// Запуск при загрузке
window.onload = () => {
    const hash = window.location.hash.substring(1);
    if (hash) {
        // Если зашли по ссылке, просим один раз кликнуть по шару для звука
        render(); 
    } else {
        render();
    }
};
</script>
</body>
</html>
