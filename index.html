<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Room - Communikator</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surf: #12121a; --border: rgba(255,255,255,0.07);
  --accent: #7efff5; --red: #ff6b6b; --green: #7effa0;
  --text: #e8e8f0; --muted: rgba(232,232,240,0.4);
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text);
  font-family: 'DM Mono', monospace; overflow:hidden; }

.app { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.card { width:100%; max-width:440px; padding:0 20px; display:flex; flex-direction:column; align-items:center; }

.logo { font-size:10px; font-weight:700; letter-spacing:0.36em; text-transform:uppercase;
  color:var(--muted); margin-bottom:48px; display:flex; align-items:center; gap:12px; }
.logo::before, .logo::after { content:''; width:24px; height:1px; background:var(--border); }

.orb { position:relative; width:172px; height:172px; margin-bottom:40px;
  cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; }
.ring { position:absolute; inset:0; border-radius:50%; border:1px solid rgba(126,255,245,0.14);
  transition: transform 0.5s; animation: pulse 2s infinite; }
@keyframes pulse { 0% {transform: scale(1); opacity: 0.5;} 50% {transform: scale(1.05); opacity: 0.8;} 100% {transform: scale(1); opacity: 0.5;} }

.orb-face { position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle at 34% 32%, #1a2828, #0c0c13);
  border:1px solid rgba(126,255,245,0.18);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; }

.orb-ico { width:34px; height:34px; color:var(--accent); filter:drop-shadow(0 0 10px rgba(126,255,245,0.4)); }
.orb-tag { font-size:9px; font-weight:700; letter-spacing:0.24em; text-transform:uppercase; color:var(--muted); }

.call-sec { width:100%; display:flex; flex-direction:column; align-items:center; gap:30px; animation: fadeIn 0.5s ease; }
.badge { display:flex; align-items:center; gap:8px; font-size:10px; color:var(--green); letter-spacing:0.2em; font-weight:700; }
.bdot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); }
.timer { font-size:32px; font-weight:300; letter-spacing: 0.05em; }

.hang { width:70px; height:70px; border-radius:50%; background: #190909; border:1px solid rgba(255,107,107,0.2);
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition: 0.2s; }
.hang:hover { border-color:var(--red); transform: scale(1.1); }

@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
</style>
</head>
<body>
<div class="app"><div id="root"></div></div>

<script>
// ── FIREBASE CONFIG (Твои актуальные данные) ──
const firebaseConfig = {
  apiKey: "AIzaSyBNku1yfBpM-SR-24S9cTLlfYDr_0uqKSA",
  databaseURL: "https://communikator-37260-default-rtdb.firebaseio.com",
  projectId: "communikator-37260",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── ПЕРЕМЕННЫЕ СОСТОЯНИЯ ──
let STATE = 'idle'; 
let roomName = '';
let myPeerId = '';
let peerInst = null;
let rawStream = null;
let activeCalls = {}; // Объект для хранения всех текущих соединений

const loadPeerJS = () => new Promise(res => {
    if (window.Peer) return res();
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    s.onload = res;
    document.head.appendChild(s);
});

// Очистка при выходе или ошибке
async function cleanup() {
    if (roomName && myPeerId) {
        db.ref(`rooms/${roomName}/${myPeerId}`).remove();
    }
    Object.values(activeCalls).forEach(call => call.close());
    activeCalls = {};
    if (rawStream) {
        rawStream.getTracks().forEach(t => t.stop());
        rawStream = null;
    }
    if (peerInst) {
        peerInst.destroy();
        peerInst = null;
    }
}

// Вход в комнату
async function joinRoom(name) {
    await cleanup();
    roomName = name;
    setS('joining');
    
    try {
        await loadPeerJS();
        myPeerId = Math.random().toString(36).substring(2, 10);
        peerInst = new Peer(myPeerId);

        peerInst.on('open', async (id) => {
            // Запрашиваем микрофон
            rawStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 1. Регистрируем себя в базе данных комнаты
            const myRef = db.ref(`rooms/${roomName}/${id}`);
            myRef.set({ joinedAt: Date.now() });
            myRef.onDisconnect().remove(); // Удалить из базы, если связь пропала

            // 2. Слушаем, кто уже в комнате или кто заходит
            db.ref(`rooms/${roomName}`).on('child_added', (snapshot) => {
                const otherPeerId = snapshot.key;
                // Если это не я и мы еще не соединены — звоним!
                if (otherPeerId !== myPeerId && !activeCalls[otherPeerId]) {
                    console.log("Calling to:", otherPeerId);
                    const call = peerInst.call(otherPeerId, rawStream);
                    handleIncomingCall(call);
                }
            });

            setS('connected');
        });

        // Слушаем входящие звонки от новых участников
        peerInst.on('call', async (call) => {
            console.log("Incoming call from:", call.peer);
            if (!rawStream) rawStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            call.answer(rawStream);
            handleIncomingCall(call);
        });

    } catch (err) {
        console.error(err);
        setS('error');
    }
}

function handleIncomingCall(call) {
    activeCalls[call.peer] = call;
    
    call.on('stream', (remoteStream) => {
        // Создаем невидимый элемент аудио для каждого участника
        const audio = document.createElement('audio');
        audio.autoplay = true;
        audio.srcObject = remoteStream;
        document.body.appendChild(audio);
    });

    call.on('close', () => {
        delete activeCalls[call.peer];
    });
}

function setS(s) { STATE = s; render(); }

function render() {
    const root = document.getElementById('root');
    let html = '';

    if (STATE === 'idle' || STATE === 'joining') {
        const label = STATE === 'idle' ? 'ENTER ROOM' : 'CONNECTING...';
        html = `<div class="orb" onclick="promptRoom()"><div class="ring"></div><div class="orb-face"><svg class="orb-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span class="orb-tag">${label}</span></div></div>`;
    } else if (STATE === 'connected') {
        html = `<div class="call-sec">
            <div class="badge"><div class="bdot"></div>LIVE</div>
            <div class="timer">ROOM: ${roomName}</div>
            <button class="hang" onclick="location.reload()">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="var(--red)"><path d="M23.71 16.67C20.66 13.78 16.54 12 12 12c-4.54 0-8.66 1.78-11.71 4.67-.18.18-.29.43-.29.71 0 .28.11.53.29.71l2.48 2.48c.18.18.43.29.71.29.27 0 .52-.11.7-.28.79-.74 1.69-1.36 2.66-1.85.33-.16.56-.5.56-.9v-3.1c1.45-.47 3-.73 4.6-.73 1.6 0 3.15.26 4.6.72v3.1c0 .4.23.74.56.9.98.49 1.87 1.12 2.66 1.85.18.18.43.28.7.28.28 0 .53-.11.71-.29l2.48-2.48c.18-.18.29-.43.29-.71 0-.28-.11-.53-.29-.71z"/></svg>
            </button>
        </div>`;
    } else {
        html = `<div style="text-align:center"><p>Error connecting to Mic</p><button onclick="location.reload()">Retry</button></div>`;
    }
    
    root.innerHTML = `<div class="card"><div class="logo">VOICE</div>${html}</div>`;
}

function promptRoom() {
    const name = prompt("Enter room name (e.g. office, game, secret):", "general");
    if (name) {
        window.location.hash = name;
        joinRoom(name);
    }
}

// Авто-вход, если в ссылке есть хеш (например, site.com/#myroom)
window.onload = () => {
    const hash = window.location.hash.substring(1);
    if (hash) joinRoom(hash);
    else render();
};
</script>
</body>
</html>
